    <text x="782" y="346" font-size="14" font-weight="700" fill="#1f2937">Add answer-first content blocks</text>
    <text x="782" y="365" font-size="12" fill="#64748b">Rewrite priority pages with concise definitions.</text>
    <rect x="766" y="390" rx="8" width="370" height="76" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="782" y="414" font-size="11" font-weight="700" fill="#c2410c">HIGH</text>
    <text x="782" y="438" font-size="14" font-weight="700" fill="#1f2937">Strengthen organization entities</text>
