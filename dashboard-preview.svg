    <text x="322" y="365">Content E-E-A-T</text><rect x="440" y="350" width="235" height="18" rx="7" fill="#dbeafe"/><rect x="440" y="350" width="179" height="18" rx="7" fill="#3b82f6"/><text x="681" y="364">76</text>
    <text x="322" y="412">Structured Data</text><rect x="440" y="397" width="235" height="18" rx="7" fill="#dbeafe"/><rect x="440" y="397" width="165" height="18" rx="7" fill="#3b82f6"/><text x="681" y="411">70</text>
    <text x="322" y="459">Platform Readiness</text><rect x="440" y="444" width="235" height="18" rx="7" fill="#dbeafe"/><rect x="440" y="444" width="155" height="18" rx="7" fill="#3b82f6"/><text x="681" y="458">66</text>
    <text x="322" y="506">AI Citability</text><rect x="440" y="491" width="235" height="18" rx="7" fill="#dbeafe"/><rect x="440" y="491" width="150" height="18" rx="7" fill="#3b82f6"/><text x="681" y="505">64</text>
    <text x="322" y="553">Brand Authority</text><rect x="440" y="538" width="235" height="18" rx="7" fill="#dbeafe"/><rect x="440" y="538" width="136" height="18" rx="7" fill="#3b82f6"/><text x="681" y="552">58</text>
  </g>

  <rect x="744" y="238" rx="12" width="416" height="390" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="766" y="272" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Actionable findings</text>
  <g font-family="Arial, sans-serif">
    <rect x="766" y="298" rx="8" width="370" height="76" fill="#fff7ed" stroke="#fed7aa"/>
